# Render Blueprint — https://render.com/docs/blueprint-spec
#
# Connect this repository in Render's dashboard and the service is provisioned
# from this file. The only manual step is setting the RAILS_MASTER_KEY env var
# (paste the contents of config/master.key).
services:
  - type: web
    name: erbswap
    runtime: ruby
    plan: free
    region: oregon
    branch: main
    buildCommand: bundle install && bin/rails assets:precompile
    startCommand: bin/rails db:prepare && bundle exec puma -C config/puma.rb
    healthCheckPath: /up
    envVars:
      - key: RAILS_MASTER_KEY
        sync: false
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "1"
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: WEB_CONCURRENCY
        value: "1"
